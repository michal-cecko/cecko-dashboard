        - paragraph [ref=f73e191]: "Doručení v rámci Česka:"
        - paragraph [ref=f73e192]: Cena za doručení při objednávkách s hodnotou pod 2700,00 Kč je 235,00 Kč. Bezplatné doručení nabízíme v případě objednávek s hodnotou nad 2700,00 Kč (kromě doručení do zahraničí, a doručení speciálních druhů zásilek - nadrozměrné zboží, vyměnitelné součástky a pneumatiky).
        - paragraph [ref=f73e193]: Při použití způsobů platby, například PayPal nebo platební karta vám nebude účtován žádný další poplatek za transakci.
        - paragraph [ref=f73e194]: "Doručení mimo Česko:"
        - paragraph [ref=f73e195]: Cena za doručení do jiných zemí uvedená níže je platná bez ohledu na hodnotu objednávky, a musí být zaplacena.
