        - paragraph [ref=f73e203]: "Příplatek za nadrozměrné zboží:"
        - paragraph [ref=f73e204]: "Za nadrozměrné zboží jsou považovány následující náhradní díly: Autobaterie, katalyzátory, svodové potrubí, tlumiče výfuku, závodní tlumiče výfuku, prahy, křídla, palivové nádrže, spoilery, boční panely, tažné spojení (závěsné spojení), přední kapoty a kryty, kryty motoru, kapoty, izolace motorového prostoru a nárazníky."
        - paragraph [ref=f73e205]: "Poplatek za nadrozměrný náklad v Česká republika činí: 507,00 Kč."
        - paragraph [ref=f73e206]: "Doručení nadrozměrného zboží v rámci Německa:"
        - paragraph [ref=f73e207]: 1) Cena doručení svodných potrubí, katalyzátorů, tlumičů výfuku nebo závodních tlumičů výfuku je navýšena o příplatek za nadrozměrné zboží v hodnotě 847,00 Kč 2) Doručení autobaterií, blatníků, prahů, palivových nádrží, bočních panelů, spoilerů a nárazníků je navýšeny o příplatek za nadrozměrné zboží v hodnotě 847,00 Kč 3) Doručení předních kapot a krytů, tažných spojení (závěsů), krytů motoru, kapot a nárazníků v rámci Německa je navýšení o příplatek za nadrozměrné zboží v hodnotě 847,00 Kč.
        - paragraph [ref=f73e208]: "Dodatečné náklady na doručení nadměrného zboží v jiných zemích: Belgie: 991,00 Kč Bulharsko: 2468,00 Kč Dánsko: 2057,00 Kč Estonsko: 2322,00 Kč Finsko: 749,00 Kč Francie: 1088,00 Kč Holandsko: 653,00 Kč Itálie: 483,00 Kč Litva: 2346,00 Kč Lotyšsko: 2346,00 Kč Lucembursko: 653,00 Kč Maďarsko: 2130,00 Kč Polsko: 1380,00 Kč Portugalsko: 1330,00 Kč Rakousko: 846,00 Kč Řecko: 3411,00 Kč Rumunsko: 2517,00 Kč Slovensko: 749,00 Kč Slovinsko: 2177,00 Kč Španělsko: 1209,00 Kč Švédsko: 2372,00 Kč Švýcarsko: 653,00 Kč"
        - paragraph [ref=f73e209]: Příplatek za nadrozměrné zboží se vztahuje na každou položku.
        - paragraph [ref=f73e210]: "Poznámka:"
        - paragraph [ref=f73e211]: Doručení nadměrného zboží do zemí, které nejsou uvedeny v seznamu výše, není možné.
        - paragraph [ref=f73e212]: Všechny uvedené ceny jsou předmětem platby DPH při současné výši 21%.
        - paragraph [ref=f73e213]: "Lhůty doručení:"
        - paragraph [ref=f73e214]: Na skladě
        - paragraph [ref=f73e215]: Produkt je dostupný. Položky s tímto statusem dostupnosti odesíláme do 1-2 pracovních dnů po obdržení platby.
        - paragraph [ref=f73e216]: Momentálně není skladem
        - paragraph [ref=f73e217]: Tuto položku nelze objednat. Již není dostupná, nebo se přestala vyrábět. Můžete si objednat podobný produkt od jiného výrobce.
        - paragraph [ref=f73e218]:
          - text: Čas doručení závisí na dostupnosti produktu. Prosím, zkontrolujte si status dostupnosti produktu, o který se zajímáte. Informace o možných celních poplatcích naleznete
          - link "zde." [ref=f73e219] [cursor=pointer]:
            - /url: https://www.celnisprava.cz/en/clo/Pages/default.aspx
        - paragraph [ref=f73e220]: Během svátků nedoručujeme.
        - paragraph [ref=f73e221]: Dodatečná možnost "Bezpečná objednávka"
        - paragraph [ref=f73e222]: S dodatečnou možností "Bezpečná objednávka" máte možnost prodloužit standardní právo na zrušení objednávky. Pro nízkonákladovou platbu 89,99 Kč na objednávku nabízíme plné vrácení peněz a bezplatné vrácení zboží v rámci prvních 100 dní, aniž byste museli uvést důvod. Na standardní právo na zrušení objednávky se odkazuje s ohledem na zpracování. Tato možnost, tak jak je nabízena, je dostupná v posledním kroku procesu objednávání. Platí pouze v případě, že produkt je v původním stavu, není poškozen a nebyl instalován. Vaše zákonné právo na zrušení objednávky tímto není nahrazeno ani ovlivněno možností "Bezpečná objednávka".
        - paragraph [ref=f73e223]: "Požadavky pro vrácení zboží při použití služby \"Bezpečná objednávka\":"
        - paragraph [ref=f73e224]:
          - text: "- Prosím, žádost o vrácení zboží podejte ve vašem osobním účtu na stránce"
          - link "www.euautodily.cz" [ref=f73e225] [cursor=pointer]:
            - /url: http://www.euautodily.cz
          - text: ", nebo kontaktujte podporu pro zákazníky. - Pošlete nám produkt v původním balení i spolu s fakturou - Náhradní díly nesmí být použity, musí být bez poškození, a bez známek namontování."
        - paragraph [ref=f73e226]: Možnost Bezpečná objednávka platí jen na jedno vrácení v rámci jedné objednávky.
        - paragraph [ref=f73e227]: Když od vás dostaneme zpět náhradní díly, důkladně je zkontrolujeme. Pokud součástka splňuje výše uvedené požadavky, součástku vyměníme za jinou nebo vám vrátíme peníze - podle vámi preferované možnosti.
        - paragraph [ref=f73e228]: "Poznámka:"
        - paragraph [ref=f73e229]: Podmínky možnosti Bezpečná objednávka se nevztahují na nadrozměrné zboží, staré vyměnitelné díly a pneumatiky. Kromě toho se podmínky možnosti Bezpečná objednávka nevztahují na produkty z jiných objednávek, pro které tato možnost nebyla zvolena.
        - paragraph [ref=f73e230]: Pneumatiky nedoručujeme do Skotska.
