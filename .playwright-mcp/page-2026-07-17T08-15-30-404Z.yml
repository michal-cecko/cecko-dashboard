      - heading "Vše o nákupu" [level=1] [ref=f71e28]
      - heading "Platba a způsob dodání" [level=2] [ref=f71e29]
      - paragraph [ref=f71e30]: V současné době nabízíme zaslání zboží Balíkovnou na adresu (Česká pošta, dříve Balík do ruky). Zasíláme také na výdejní místa Balíkovny. Platba v rámci ČR je možná prostřednictvím dobírky (vyjma AlzaBoxů) nebo platby předem na účet (Fio banka). Na Slovensko je možné zaslat na adresu, ale je možná pouze platba předem na účet.
      - heading "Minimální hodnota objednávky - zaslání do ČR" [level=2] [ref=f71e31]
      - paragraph [ref=f71e32]: Mimimální hodnota objednávky je 200 Kč při platbě předem na účet. Mimimální hodnota objednávky pro zaslání na dobírku je 300 Kč. Do této ceny se nezapočítávají náklady na dopravu (poštovné).
      - heading "Minimální hodnota objednávky - zaslání do zahraničí" [level=2] [ref=f71e33]
      - paragraph [ref=f71e34]: Mimimální hodnota objednávky pro zaslání do zahraničí je 1000 Kč. Do této ceny se nezapočítávají náklady na dopravu (poštovné).
      - heading "Balné" [level=2] [ref=f71e35]
      - paragraph [ref=f71e36]: Balné ve výši 20 Kč je účtováno pouze u objednávek do 300 Kč (bez poštovného).
