      - paragraph [ref=f71e87]: Zboží zasíláme po území České republiky a na Slovensko. Po dohodě také v rámci zbytku EU.
      - heading "Záruka" [level=2] [ref=f71e88]
      - paragraph [ref=f71e89]: Na náhradní díly zakoupené v eshopu DoOpla.cz poskytujeme záruku v trvání 24 měsíců.
      - paragraph [ref=f71e90]: Z této záruky jsou vyloučeny díly podléhající běžnému opotřebení, díly poškozené vnějšími vlivy a díly, které nebyly namontovány v souladu s předepsaným technologickým postupem výrobce vozu.
