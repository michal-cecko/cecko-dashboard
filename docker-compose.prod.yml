
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapps-dashboard
    env_file: .env.prod
    volumes:
      - type: bind
        source: /volumes/synapps-dashboard/storage/app
        target: /var/www/storage/app
      - type: bind
        source: /volumes/synapps-dashboard/storage/logs
        target: /var/www/storage/logs
      - type: tmpfs
        target: /var/www/bootstrap/cache
      - type: tmpfs
        target: /var/www/storage/debugbar/
      - type: tmpfs
        target: /var/www/storage/framework/cache
      - type: tmpfs
        target: /var/www/storage/framework/sessions
      - type: tmpfs
        target: /var/www/storage/framework/views
    labels:
      - "traefik.enable=true"
      # HTTP router - redirects to HTTPS
      - "traefik.http.routers.adminka.rule=Host(`adminka.synapps.sk`)"
      - "traefik.http.routers.adminka.entrypoints=web"
      - "traefik.http.routers.adminka.middlewares=adminka-redirect"
      # HTTPS router
      - "traefik.http.routers.adminka-secure.rule=Host(`adminka.synapps.sk`)"
      - "traefik.http.routers.adminka-secure.entrypoints=websecure"
      - "traefik.http.routers.adminka-secure.tls.certresolver=myresolver"
      # Service
      - "traefik.http.services.adminka.loadbalancer.server.port=8000"
      # Redirect middleware
      - "traefik.http.middlewares.adminka-redirect.redirectscheme.scheme=https"
      - "traefik.docker.network=web"
    networks:
      - web
      - database

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapps-dashboard-worker
    env_file: .env.prod
    command: sh -c "php artisan schedule:work & php artisan queue:work --sleep=3 --tries=3 --max-time=3600"
    volumes:
      - type: bind
        source: /volumes/synapps-dashboard/storage/app
        target: /var/www/storage/app
      - type: bind
        source: /volumes/synapps-dashboard/storage/logs
        target: /var/www/storage/logs
      - type: tmpfs
        target: /var/www/bootstrap/cache
      - type: tmpfs
        target: /var/www/storage/framework/cache
      - type: tmpfs
        target: /var/www/storage/framework/sessions
      - type: tmpfs
        target: /var/www/storage/framework/views
    networks:
      - database
    restart: unless-stopped

networks:
  web:
    external: true
  database:
    external: true
