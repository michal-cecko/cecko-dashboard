
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapps-dashboard
    environment:
      - APP_KEY=base64:***REMOVED***=
      - APP_LOCALE=sk
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://adminka.synapps.sk
      - DB_CONNECTION=pgsql
      - DB_HOST=synapps-pgsql
      - DB_PORT=5432
      - DB_DATABASE=synapps_dashboard
      - DB_USERNAME=dashboard_user
      - DB_PASSWORD=***REMOVED***
      - QUEUE_CONNECTION=database
    labels:
      - "traefik.enable=true"
      # HTTP router - redirects to HTTPS
      - "traefik.http.routers.adminka.rule=Host(`adminka.synapps.sk`)"
      - "traefik.http.routers.adminka.entrypoints=web"
      - "traefik.http.routers.adminka.middlewares=adminka-redirect"
      # HTTPS router
      - "traefik.http.routers.adminka-secure.rule=Host(`adminka.synapps.sk`)"
      - "traefik.http.routers.adminka-secure.entrypoints=websecure"
      - "traefik.http.routers.adminka-secure.tls.certresolver=myresolver"
      # Service
      - "traefik.http.services.adminka.loadbalancer.server.port=8000"
      # Redirect middleware
      - "traefik.http.middlewares.adminka-redirect.redirectscheme.scheme=https"
      - "traefik.docker.network=web"
    networks:
      - web
      - database

networks:
  web:
    external: true
  database:
    external: true
