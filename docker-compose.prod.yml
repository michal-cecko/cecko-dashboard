services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapps-dashboard
    environment:
      - APP_KEY=base64:***REMOVED***=
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=https://adminka.synapps.sk
      - DB_CONNECTION=pgsql
      - DB_HOST=synapps-pgsql
      - DB_PORT=5432
      - DB_DATABASE=synapps_dashboard
      - DB_USERNAME=dashboard_user
      - DB_PASSWORD=***REMOVED***
      - QUEUE_CONNECTION=database
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminka.rule=Host(`adminka.synapps.sk`)"
      - "traefik.http.routers.adminka.entrypoints=websecure"
      - "traefik.http.routers.adminka.tls.certresolver=myresolver"
      - "traefik.http.services.adminka.loadbalancer.server.port=8000"
      - "traefik.http.routers.adminka-http.rule=Host(`adminka.synapps.sk`)"
      - "traefik.http.routers.adminka-http.entrypoints=web"
      - "traefik.http.routers.adminka-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
    networks:
      - web
      - database

networks:
  web:
    external: true
  database:
    external: true
