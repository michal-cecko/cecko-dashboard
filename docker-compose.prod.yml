services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapps-dashboard
    environment:
      - APP_KEY=base64:***REMOVED***=
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=https://adminka.synapps.sk
      - DB_CONNECTION=pgsql
      - DB_HOST=synapps-pgsql
      - DB_PORT=5432
      - DB_DATABASE=synapps_dashboard
      - DB_USERNAME=dashboard_user
      - DB_PASSWORD=v9qcX5vp&r
      - QUEUE_CONNECTION=database
    labels:
      - "traefik.enable=true"
      # HTTP router (for ACME challenges and redirect)
      - "traefik.http.routers.dashboard-http.rule=Host(`adminka.synapps.sk`)"
      - "traefik.http.routers.dashboard-http.entrypoints=web"
      - "traefik.http.routers.dashboard-http.middlewares=https-redirect"
      # HTTPS router
      - "traefik.http.routers.dashboard.rule=Host(`adminka.synapps.sk`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
      # Service
      - "traefik.http.services.dashboard.loadbalancer.server.port=8000"
      # Middleware for redirect
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
    networks:
      - web
      - database
    expose:
      - "8000"

networks:
  web:
    external: true
  database:
    external: true
